name = "sam"
compatibility_date = "2026-07-13"
compatibility_flags = ["nodejs_compat"]
main = "./dist/_worker.js/index.js"

[assets]
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "sam-production"
database_id = "570120ea-e17f-453a-b71e-76425e3362a8"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "sam-media-production"

[vars]
PUBLIC_MEDIA_BASE_URL = "/media"
INITIAL_ADMIN_EMAIL = "greg.clb@gmail.com"
ADMIN_PATH = "/sam-admin"
